name: All Tests

on:
  push:
  pull_request:
    branches:
      - develop
      - master
  workflow_dispatch:

concurrency:
  group: alltests-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  #============================================================
  # Feature branches: Linux only
  # Protected branches / PRs into develop or master: full 3-OS sweep
  #============================================================
  select-matrix:
    name: Select CI scope
    runs-on: ubuntu-latest
    outputs:
      os-matrix: ${{ steps.scope.outputs.os-matrix }}
      run-booktests: ${{ steps.scope.outputs.run-booktests }}
    steps:
      - name: Decide runner matrix and booktest scope
        id: scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          full_sweep=false
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            full_sweep=true
          elif [[ "$EVENT_NAME" == "pull_request" && ( "$BASE_REF" == "develop" || "$BASE_REF" == "master" ) ]]; then
            full_sweep=true
          elif [[ "$REF_NAME" == "develop" || "$REF_NAME" == "master" ]]; then
            full_sweep=true
          fi

          if [[ "$full_sweep" == "true" ]]; then
            echo 'os-matrix=["windows-latest","macos-latest","ubuntu-latest"]' >> "$GITHUB_OUTPUT"
            echo 'run-booktests=true' >> "$GITHUB_OUTPUT"
          else
            echo 'os-matrix=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
            echo 'run-booktests=false' >> "$GITHUB_OUTPUT"
          fi

  tests:
    needs: select-matrix
    name: All Tests on ${{ matrix.os }} (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    env:
      RUN_BOOKTESTS: ${{ needs.select-matrix.outputs.run-booktests }}
    strategy:
        matrix:
            os: ${{ fromJSON(needs.select-matrix.outputs.os-matrix) }}
            python-version: ['3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          python-version: ${{ matrix.python-version }}
          auto-activate-base: true
          conda-remove-defaults: true
          use-only-tar-bz2: true
      
      # -----------------------------------------------------------
      # Clean old coverage files
      # -----------------------------------------------------------
      - name: Remove old coverage data (Unix)
        if: runner.os != 'Windows'
        run: |
          rm -f .coverage* coverage.json || true
      - name: Remove old coverage data (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Remove-Item -Path .coverage* -Force -ErrorAction SilentlyContinue -Confirm:$false
          Remove-Item -Path coverage.json -Force -ErrorAction SilentlyContinue -Confirm:$false
      # -----------------------------------------------------------
      # Add 12GB swap, i.e., virtual memory (OS-specific)
      # -----------------------------------------------------------
      - name: Add 12GB swap (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          echo "=== Existing swap devices ==="
          swapon --show || true

          current_swap_mb=$(free -m | awk '/^Swap:/ {print $2}')
          if [ "${current_swap_mb:-0}" -ge 12000 ]; then
            echo "Sufficient swap already present (${current_swap_mb} MB). Skipping swap creation."
            free -h
            exit 0
          fi

          SWAPFILE=/tmp/qmcsoftware_swapfile

          if [ -f "$SWAPFILE" ]; then
            sudo swapoff "$SWAPFILE" || true
            sudo rm -f "$SWAPFILE"
          fi

          sudo fallocate -l 12G "$SWAPFILE"
          sudo chmod 600 "$SWAPFILE"
          sudo mkswap "$SWAPFILE"
          sudo swapon "$SWAPFILE"

          echo "=== Swap after setup ==="
          swapon --show
          free -h

      - name: Add 12GB swap (macOS)
        if: runner.os == 'macOS'
        run: |
          # Create and mount a temporary swapfile
          sudo mkfile 12g /private/var/vm/tempswapfile
          sudo chmod 600 /private/var/vm/tempswapfile

      - name: Configure pagefile (Windows) via CIM (12GB)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $drive    = "D:"
          $initialMB = 12288
          $maxMB     = 12288
          $pagefile  = "$drive\pagefile.sys"
          Write-Host "Configuring pagefile: $pagefile (Initial=${initialMB}MB, Max=${maxMB}MB)"
          # Disable automatic management
          $cs = Get-CimInstance Win32_ComputerSystem
          if ($cs.AutomaticManagedPagefile) {
            Set-CimInstance -InputObject $cs -Property @{ AutomaticManagedPagefile = $false } | Out-Null
          }
          # Create or update the pagefile setting
          $escaped = $pagefile.Replace('\','\\')
          $pfs = Get-CimInstance Win32_PageFileSetting -Filter "Name='$escaped'" -ErrorAction SilentlyContinue
          if ($null -eq $pfs) {
            New-CimInstance -ClassName Win32_PageFileSetting -Property @{
              Name        = $pagefile
              InitialSize = $initialMB
              MaximumSize = $maxMB
            } | Out-Null
          } else {
            Set-CimInstance -InputObject $pfs -Property @{
              InitialSize = $initialMB
              MaximumSize = $maxMB
            } | Out-Null
          }
          "=== Pagefile settings ==="
          Get-CimInstance Win32_PageFileSetting | Format-Table Name,InitialSize,MaximumSize -Auto
      # -----------------------------------------------------------
      # Free disk + conda cache early (OS-specific)
      # -----------------------------------------------------------
      - name: Free space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          conda clean --all --yes
          pip cache purge || true
          df -h
      - name: Free space (macOS)
        if: runner.os == 'macOS'
        run: |
          conda clean --all --yes
          pip cache purge || true
          df -h
      - name: Free space (Windows)
        if: runner.os == 'Windows'
        run: |
          conda clean --all --yes || true
          pip cache purge || true
          Get-Volume | Select-Object DriveLetter, Size, SizeRemaining | Format-Table
      # -----------------------------------------------------------
      # Show resources (OS-specific)
      # -----------------------------------------------------------
      - name: Show runner resources
        if: runner.os != 'Windows'
        run: |
          echo "CPUs: $(nproc || sysctl -n hw.ncpu)"
          free -h || vm_stat
          df -h
      - name: Show runner resources
        if: runner.os == 'Windows'
        run: |
          # Check current pagefile settings
          Get-WmiObject Win32_PageFileUsage | Select-Object Name, AllocatedBaseSize
          # Display system memory info
          Get-ComputerInfo -Property CsTotalPhysicalMemory
      # -----------------------------------------------------------
      # Install Python dependencies
      # -----------------------------------------------------------
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pip/wheels
            ~/Library/Caches/pip
            ~/Library/Caches/pip/wheels
            ~\AppData\Local\pip\Cache
            ~\AppData\Local\pip\Cache\wheels
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Cache wheel files
        uses: actions/cache@v4
        with:
          path: ./.wheels
          key: ${{ runner.os }}-wheels-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-wheels-
          
      - name: Build and cache wheels (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m pip wheel -w ./.wheels .[test,test_torch,test_gpytorch,test_botorch,test_umbridge] || true
      - name: Install Python dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          pip install --find-links ./.wheels -e ".[test,test_torch,test_gpytorch,test_botorch,test_umbridge]"
      - name: Build and cache wheels (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m pip wheel -w ./.wheels .[test,test_torch,test_gpytorch,test_botorch] || true
      - name: Install Python dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          pip install --find-links ./.wheels -e ".[test,test_torch,test_gpytorch,test_botorch]"
      - name: Build and cache wheels (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip wheel -w ./.wheels .[test,test_torch,test_gpytorch,test_botorch] || Write-Host 'wheel build step completed'
      - name: Install Python dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pip install --find-links ./.wheels -e '.[test,test_torch,test_gpytorch,test_botorch]'
      # -----------------------------------------------------------
      # Install minimal LaTeX required by Jupyter notebooks (OS-specific)
      # -----------------------------------------------------------
      - name: Install minimal LaTeX (Linux)
        if: runner.os == 'Linux' && env.RUN_BOOKTESTS == 'true'
        run: |
          sudo apt update
          sudo apt install -y texlive-latex-base texlive-latex-extra texlive-latex-recommended latexmk dvipng cm-super
      - name: Install minimal LaTeX (macOS)
        if: runner.os == 'macOS' && env.RUN_BOOKTESTS == 'true'
        run: |
          brew install --cask basictex
          eval "$(/usr/libexec/path_helper)"
          sudo tlmgr update --self
          sudo tlmgr install latexmk dvipng collection-fontsrecommended type1cm
      - name: Cache MiKTeX (Windows)
        if: runner.os == 'Windows' && env.RUN_BOOKTESTS == 'true'
        uses: actions/cache@v4
        with:
          path: C:\Program Files\MiKTeX
          key: ${{ runner.os }}-miktex-${{ hashFiles('.github/workflows/alltests.yml') }}
          restore-keys: |
            ${{ runner.os }}-miktex-
          
      - name: Install minimal LaTeX (Windows)
        if: runner.os == 'Windows' && env.RUN_BOOKTESTS == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          choco install miktex -y --no-progress --execution-timeout=600
          choco install strawberryperl -y --no-progress
          # Put MiKTeX on PATH for all subsequent steps
          echo "C:\Program Files\MiKTeX\miktex\bin\x64" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          # Refresh PATH in current session
          $env:PATH = "C:\Program Files\MiKTeX\miktex\bin\x64;$env:PATH"
          # Enable auto-install of missing packages (MiKTeX "just enough TeX" approach)
          initexmf --admin --set-config-value [MPM]AutoInstall=1
          # Refresh package database + upgrade base with retry
          $retries = 2
          for ($i = 1; $i -le $retries; $i++) {
            try {
              mpm --admin --update-db
              mpm --admin --upgrade
              break
            } catch {
              if ($i -eq $retries) { throw }
              Write-Host "Retry $i/$retries failed, waiting 10s..."
              Start-Sleep -Seconds 10
            }
          }
          # Install a few common "baseline" MiKTeX packages explicitly
          mpm --admin --install=latexmk
          mpm --admin --install=dvipng
          mpm --admin --install=cm-super
          mpm --admin --install=lmodern
          mpm --admin --install=type1cm
          mpm --admin --install=tex-gyre
          latex --version
          latexmk -v
          dvipng --version
      
      # -----------------------------------------------------------
      # Run doctests (OS-specific)
      # -----------------------------------------------------------      
      - run: pip freeze
      - run: make doctests_minimal
      - run: make doctests_torch
      - run: make doctests_gpytorch
      - run: make doctests_botorch
      - run: make doctests_markdown
      - name: Run umbridge doctests on Linux full sweeps when Docker is available
        shell: bash -l {0}
        run: |
          if [ "$RUNNER_OS" == "Linux" ] && [ "$RUN_BOOKTESTS" == "true" ] && command -v docker >/dev/null 2>&1; then
            make doctests_umbridge
          elif [ "$RUNNER_OS" != "Linux" ]; then
            echo "umbridge doctests only run on Linux"
          elif [ "$RUN_BOOKTESTS" != "true" ]; then
            echo "Skipping umbridge doctests outside full sweeps"
          else
            echo "Skipping umbridge doctests because Docker is not available on this runner"
          fi
      # -----------------------------------------------------------
      # Run unittests for Python source files
      # -----------------------------------------------------------   
      - name: Run unittests (parallel)
        run: make unittests

      # -----------------------------------------------------------
      # Upload doctest + unittest coverage BEFORE booktests wipe artifacts/
      # -----------------------------------------------------------
      - name: Upload pre-booktest coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: alltests
          fail_ci_if_error: false
          files: >-
            ./artifacts/coverage/unit/coverage.json,
            ./artifacts/coverage/doctests/minimal/coverage.json,
            ./artifacts/coverage/doctests/torch/coverage.json,
            ./artifacts/coverage/doctests/gpytorch/coverage.json,
            ./artifacts/coverage/doctests/botorch/coverage.json

      # -----------------------------------------------------------
      # Free disk + conda cache before booktests (OS-specific)
      # -----------------------------------------------------------
      - name: Free space (Linux)
        if: runner.os == 'Linux' && env.RUN_BOOKTESTS == 'true'
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          conda clean --all --yes
          pip cache purge || true
          df -h
      - name: Free space (macOS)
        if: runner.os == 'macOS' && env.RUN_BOOKTESTS == 'true'
        run: |
          conda clean --all --yes
          pip cache purge || true
          df -h
      - name: Free space (Windows)
        if: runner.os == 'Windows' && env.RUN_BOOKTESTS == 'true'
        run: |
          conda clean --all --yes || true
          pip cache purge || true
          Get-Volume | Select-Object DriveLetter, Size, SizeRemaining | Format-Table
      # -----------------------------------------------------------
      # Run unittests for Jupyter notebooks (OS-specific)
      # ----------------------------------------------------------- 
      - name: Run booktests (parallel) on Linux
        if: runner.os != 'Windows' && env.RUN_BOOKTESTS == 'true'
        shell: bash -l {0}
        run: |
          make booktests_parallel_no_docker    # Parsl not supported on Windows
      - name: Run booktests (parallel) on Windows
        if: runner.os == 'Windows' && env.RUN_BOOKTESTS == 'true'
        shell: pwsh
        run: |
          make booktests_parallel_pytest PYTEST_XDIST="-n 4" PYTEST="-m 'not slow'"

      # -----------------------------------------------------------
      # Upload coverage to Codecov
      # -----------------------------------------------------------
      - name: Upload coverage to Codecov
        if: always() && env.RUN_BOOKTESTS == 'true'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: alltests
          fail_ci_if_error: false
          files: ./artifacts/coverage/booktests/coverage.json
  
# For success reports, see https://github.com/QMCSoftware/QMCSoftware/actions?query=is%3Asuccess+workflow%3AAll+Tests
