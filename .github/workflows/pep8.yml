name: PEP8 Badge

on:
  push:
    branches:
      - master
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          auto-activate-base: true
          conda-remove-defaults: true
          use-only-tar-bz2: true
      - name: Install lint dependency
        run: |
          python -m pip install pylint
      - name: Run check_pep8
        run: |
          set -o pipefail
          make check_pep8 | tee pylint.out
      - name: Update badge JSON
        run: |
          python scripts/update_pep8_badge.py pylint.out docs/assets/pep8-badge.json docs/assets/pep8-badge.svg
      - name: Commit badge update
        run: |
          if git diff --quiet -- docs/assets/pep8-badge.json docs/assets/pep8-badge.svg; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/assets/pep8-badge.json docs/assets/pep8-badge.svg
          git commit -m "Update PEP8 badge"
          git push
