name: PEP8 Badge

on:
  push:
    branches:
      - master
      - develop
      - main
      - doc_choi  # temporary
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          auto-activate-base: true
          conda-remove-defaults: true
          use-only-tar-bz2: true
      - name: Install lint dependency
        run: |
          python -m pip install pylint
      - name: Run check_pep8
        run: |
          set -o pipefail
          make check_pep8 | tee pylint.out
      - name: Update badge JSON
        run: |
          python scripts/update_pep8_badge.py pylint.out docs/assets/pep8-badge.json docs/assets/pep8-badge.svg
      - name: Detect badge changes
        id: badge_changes
        run: |
          if git diff --quiet -- docs/assets/pep8-badge.json docs/assets/pep8-badge.svg; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Create badge update pull request
        if: steps.badge_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: |
            docs/assets/pep8-badge.json
            docs/assets/pep8-badge.svg
          branch: automation/update-pep8-badge
          delete-branch: true
          commit-message: Update PEP8 badge
          title: Update PEP8 badge
          body: |
            Automated update of the PEP8 badge assets generated by the `PEP8 Badge` workflow.
