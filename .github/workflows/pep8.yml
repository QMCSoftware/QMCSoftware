name: PEP8 Badge

on:
  push:
    branches:
      - master
      - develop
  workflow_dispatch:

concurrency:
  group: pep8-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install project with lint dependencies
        run: |
          python -m pip install -e ".[docs]"
      - name: Run check_pep8
        run: |
          set -o pipefail
          make check_pep8 | tee pylint.out
      - name: Update badge JSON
        run: |
          python scripts/update_pep8_badge.py pylint.out docs/assets/pep8-badge.json docs/assets/pep8-badge.svg
      - name: Detect badge changes
        id: badge_changes
        run: |
          if git diff --quiet -- docs/assets/pep8-badge.json docs/assets/pep8-badge.svg; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Create badge update pull request
        if: steps.badge_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: |
            docs/assets/pep8-badge.json
            docs/assets/pep8-badge.svg
          branch: automation/update-pep8-badge
          delete-branch: true
          commit-message: Update PEP8 badge
          title: Update PEP8 badge
          body: |
            Automated update of the PEP8 badge assets generated by the `PEP8 Badge` workflow.
