name: Unit Tests

on:
  push:
    branches:
      - develop
      - master
  pull_request:
    branches:
      - develop
      - master
  workflow_dispatch:

concurrency:
  group: unittests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Linux-only Python version sweep for the supported CI dependency stack.
  tests:
    name: Unit Tests on Ubuntu (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          python-version: ${{ matrix.python-version }}
          auto-activate-base: true
          conda-remove-defaults: true
          use-only-tar-bz2: true

      # -----------------------------------------------------------
      # Clean old coverage files
      # -----------------------------------------------------------
      - name: Remove old coverage data
        run: |
          rm -f .coverage* coverage.json || true

      # -----------------------------------------------------------
      # Add 12GB swap, i.e., virtual memory
      # -----------------------------------------------------------
      - name: Add 12GB swap
        run: |
          set -euxo pipefail
          echo "=== Existing swap devices ==="
          swapon --show || true

          current_swap_mb=$(free -m | awk '/^Swap:/ {print $2}')
          if [ "${current_swap_mb:-0}" -ge 12000 ]; then
            echo "Sufficient swap already present (${current_swap_mb} MB). Skipping swap creation."
            free -h
            exit 0
          fi

          SWAPFILE=/tmp/qmcsoftware_swapfile

          if [ -f "$SWAPFILE" ]; then
            sudo swapoff "$SWAPFILE" || true
            sudo rm -f "$SWAPFILE"
          fi

          sudo fallocate -l 12G "$SWAPFILE"
          sudo chmod 600 "$SWAPFILE"
          sudo mkswap "$SWAPFILE"
          sudo swapon "$SWAPFILE"

          echo "=== Swap after setup ==="
          swapon --show
          free -h

      # -----------------------------------------------------------
      # Free disk + conda cache early
      # -----------------------------------------------------------
      - name: Free space
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          conda clean --all --yes
          pip cache purge || true
          df -h

      # -----------------------------------------------------------
      # Show runner resources
      # -----------------------------------------------------------
      - name: Show runner resources
        run: |
          echo "CPUs: $(nproc)"
          free -h
          df -h

      # -----------------------------------------------------------
      # Install Python dependencies
      # -----------------------------------------------------------
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pip/wheels
          key: ubuntu-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ubuntu-pip-${{ matrix.python-version }}-
            ubuntu-pip-

      - name: Cache wheel files
        uses: actions/cache@v4
        with:
          path: ./.wheels
          key: ubuntu-wheels-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ubuntu-wheels-${{ matrix.python-version }}-
            ubuntu-wheels-

      - name: Build and cache wheels
        run: |
          python -m pip wheel -w ./.wheels .[test,test_torch,test_gpytorch,test_botorch] || true

      - name: Install Python dependencies
        run: |
          pip install --find-links ./.wheels -e ".[test,test_torch,test_gpytorch,test_botorch]"

      # -----------------------------------------------------------
      # Run unittests for Python source files
      # -----------------------------------------------------------
      - name: Run unittests (parallel)
        run: make unittests
