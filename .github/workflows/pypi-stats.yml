name: PyPI stats

on:
  push:
    branches:
      - develop
      - add-pypistats-dev
    paths:
      - ".github/workflows/pypi-stats.yml"
      - "scripts/pypi_stats.py"
      - "README.md"
      - "pyproject.toml"
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pypi-stats
  cancel-in-progress: true

jobs:
  update-pypi-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pypistats
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pypistats>=1.0.0"

      - name: Generate stats report
        run: |
          python scripts/pypi_stats.py

      - name: Commit updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats/pypi_downloads.md
          git diff --cached --quiet || git commit -m "Update PyPI download stats"

      - name: Push changes
        run: |
          git push

