name: PyPI stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"  # every Monday at 06:17 UTC

permissions:
  contents: write  # needed to push updated stats to pypi-stats

concurrency:
  group: pypi-stats-publish
  cancel-in-progress: true

jobs:
  update-pypi-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pypistats

      - name: Generate stats files
        run: |
          python scripts/pypi_stats.py
          ls -l stats
          cat stats/pypi_impact_one_liner.txt

      - name: Check out pypi-stats branch
        uses: actions/checkout@v4
        with:
          ref: pypi-stats
          path: pypi-stats-branch

      - name: Copy generated files into pypi-stats branch
        run: |
          mkdir -p pypi-stats-branch/stats
          cp stats/pypi_downloads.md pypi-stats-branch/stats/pypi_downloads.md
          cp stats/pypi_impact_one_liner.md pypi-stats-branch/stats/pypi_impact_one_liner.md
          cp stats/pypi_impact_one_liner.txt pypi-stats-branch/stats/pypi_impact_one_liner.txt

      - name: Commit and push updates to pypi-stats
        run: |
          cd pypi-stats-branch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats/pypi_downloads.md stats/pypi_impact_one_liner.md stats/pypi_impact_one_liner.txt
          git diff --cached --quiet && exit 0
          git commit -m "Update PyPI stats"
          git push origin pypi-stats

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: pypi-download-stats
          path: |
            stats/pypi_downloads.md
            stats/pypi_impact_one_liner.md
            stats/pypi_impact_one_liner.txt
